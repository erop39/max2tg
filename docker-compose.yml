version: '3.5'

services:
  max2tg:
    build: .
    restart: unless-stopped
    # Секреты только из .env на хосте (chmod 600). Не дублируйте токены в этом файле.
    env_file:
      - .env
    environment:
      LOG_DIR: /app/logs
    volumes:
      - ./logs:/app/logs
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
